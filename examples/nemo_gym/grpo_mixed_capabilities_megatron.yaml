# Mixed-capability GRPO training — Megatron-Core backend.
# Better for large models (10B+) and multi-node training.
# Requires: TORCH_CUDA_ARCH_LIST set (e.g. '8.0' for A100, '9.0' for H100)
# Pre-build venv: UV_PROJECT_ENVIRONMENT=venvs/nemo_rl.models.policy.workers.megatron_policy_worker.MegatronPolicyWorker \
#                   uv sync --locked --extra mcore
#
# Usage:
#   TORCH_CUDA_ARCH_LIST='8.0' uv run python examples/nemo_gym/run_grpo_nemo_gym.py \
#       --config examples/nemo_gym/grpo_mixed_capabilities_megatron.yaml \
#       policy.model_name=<your-model>

grpo:
  max_num_epochs: 1
  num_prompts_per_step: 64
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_steps: 1000000
  normalize_rewards: false
  use_leave_one_out_baseline: true
  val_period: 50
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: null
  val_batch_size: null
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  skip_reference_policy_logprobs_calculation: true
  seq_logprob_error_threshold: null

  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

loss_fn:
  reference_policy_kl_penalty: 0
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  truncated_importance_sampling_ratio: null
  use_importance_sampling_correction: false
  token_level_loss: true

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-mixed-capabilities-megatron"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 50
  checkpoint_must_save_by: null
  save_optimizer: true

policy:
  model_name: "nvidia/NVIDIA-Nemotron-Nano-9B-v2"  # override via CLI
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}
  train_micro_batch_size: 1
  logprob_batch_size: 1
  generation_batch_size: 32
  max_total_sequence_length: 8192
  precision: "bfloat16"
  logprob_chunk_size: null

  dtensor_cfg:
    _v2: false
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 2
    context_parallel_size: 1
    custom_parallel_plan: null
    clear_cache_every_n_steps: null

  megatron_cfg:
    enabled: true
    bias_activation_fusion: false
    tensor_model_parallel_size: 2
    empty_unused_memory_level: 0
    activation_checkpointing: true
    train_iters: 100000
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    apply_rope_fusion: true
    defer_fp32_logits: false
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: false

    optimizer:
      optimizer: "adam"
      lr: 5.0e-6
      min_lr: 5.0e-7
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
      clip_grad: ${policy.max_grad_norm}

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 100000
      lr_warmup_iters: 13
      lr_warmup_init: 5.0e-7
      override_opt_param_scheduler: true

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    env_vars: null

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: 1
  max_grad_norm: 1.0
  offload_optimizer_for_logprob: false

  # Megatron manages its own optimizer; this field is unused when megatron_cfg.enabled=true
  optimizer: null

  scheduler:
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: []

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      kv_cache_dtype: "auto"
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: false
    vllm_kwargs:
      compilation_config:
        backend: eager
      mamba_ssm_cache_dtype: "float32"
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

data:
  max_input_seq_length: null
  shuffle: true
  num_workers: 0
  use_multiple_dataloader: false

  train:
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/math_with_judge/data/OpenMathReasoning_train.jsonl
      env_name: math_with_judge
      fraction: 0.40
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/code_gen/data/opencodereasoning_filtered_25k_train.jsonl
      env_name: code_gen
      fraction: 0.28
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/mcqa/data/train.jsonl
      env_name: mcqa
      fraction: 0.16
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/reasoning_gym/data/Nemotron-RL-ReasoningGym-v1_train.jsonl
      env_name: reasoning_gym
      fraction: 0.16

  validation:
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/math_with_judge/data/OpenMathReasoning_aime24_validation.jsonl
      env_name: math_with_judge
    - data_path: 3rdparty/Gym-workspace/Gym/resources_servers/code_gen/data/livecodebench_v5_2024-07-01_2025-02-01_validation.jsonl
      env_name: code_gen

  default:
    dataset_name: NemoGymDataset
    env_name: null
    prompt_file: null
    system_prompt_file: null
    processor: "nemo_gym_data_processor"

env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true

  nemo_gym_envs:
    math_with_judge:
      rollout_max_attempts_to_avoid_lp_nan: 1
      config_paths:
        - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
        - resources_servers/math_with_judge/configs/math_with_judge.yaml
      policy_model:
        responses_api_models:
          vllm_model:
            uses_reasoning_parser: false

    code_gen:
      rollout_max_attempts_to_avoid_lp_nan: 1
      config_paths:
        - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
        - resources_servers/code_gen/configs/code_gen.yaml
      policy_model:
        responses_api_models:
          vllm_model:
            uses_reasoning_parser: false

    mcqa:
      rollout_max_attempts_to_avoid_lp_nan: 1
      config_paths:
        - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
        - resources_servers/mcqa/configs/mcqa.yaml
      policy_model:
        responses_api_models:
          vllm_model:
            uses_reasoning_parser: false

    reasoning_gym:
      rollout_max_attempts_to_avoid_lp_nan: 1
      config_paths:
        - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
        - resources_servers/reasoning_gym/configs/reasoning_gym.yaml
      policy_model:
        responses_api_models:
          vllm_model:
            uses_reasoning_parser: false

logger:
  log_dir: "logs/grpo-mixed-capabilities-megatron"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "grpo-mixed-capabilities"
    name: "grpo-mixed-capabilities-megatron"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-mixed-capabilities"
    run_name: "grpo-mixed-capabilities-megatron"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 4
  num_nodes: 1
